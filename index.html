<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>太平洋房屋站前店稅務試算入口</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --secondary: #0f172a;
      --secondary-hover: #020617;
      --line: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", sans-serif;
      background: linear-gradient(180deg, #eaf2ff 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 760px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 40px 28px;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 34px;
      line-height: 1.2;
    }

    .subtitle {
      margin: 0 auto 32px;
      max-width: 560px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.8;
    }


    .form-box {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin: 0 auto 24px;
      max-width: 620px;
      text-align: left;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field label {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .field input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      background: #fff;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      margin-top: 12px;
    }

    .menu-btn {
      display: block;
      text-decoration: none;
      border-radius: 18px;
      padding: 24px 20px;
      color: white;
      font-weight: 800;
      font-size: 20px;
      line-height: 1.5;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
    }

    .menu-btn:hover {
      transform: translateY(-2px);
    }

    .btn-house {
      background: var(--primary);
    }

    .btn-house:hover {
      background: var(--primary-hover);
    }

    .btn-land {
      background: var(--secondary);
    }

    .btn-land:hover {
      background: var(--secondary-hover);
    }

    .desc {
      display: block;
      margin-top: 8px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0.92;
    }

    .footer {
      margin-top: 28px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
    }

    @media (max-width: 640px) {
      .card {
        padding: 28px 18px;
        border-radius: 20px;
      }

      h1 {
        font-size: 28px;
      }

      .subtitle {
        font-size: 15px;
        margin-bottom: 24px;
      }

  
    .form-box {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin: 0 auto 24px;
      max-width: 620px;
      text-align: left;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field label {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .field input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      background: #fff;
    }

    .button-grid {
        grid-template-columns: 1fr;
      }

      .menu-btn {
        font-size: 18px;
        padding: 20px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>太平洋房屋站前店稅務試算入口</h1>
      <p class="subtitle">
        請先填寫客戶資料，再選擇要使用的試算工具
      </p>

      <div class="form-box">
        <div class="field">
          <label for="salesName">業務姓名</label>
          <input id="salesName" type="text" placeholder="請輸入姓名" />
        </div>
        <div class="field">
          <label for="salesPhone">業務手機</label>
          <input id="salesPhone" type="tel" inputmode="numeric" placeholder="請輸入手機號碼" />
        </div>
      </div>

      <div class="button-grid">
        <a class="menu-btn btn-house" href="./house-sale-tax-calculator.html" onclick="saveSalesInfo()">
          房地合一稅試算
          <span class="desc">進入房地合一稅計算頁面</span>
        </a>

        <a class="menu-btn btn-land" href="./land-tax-calculator.html" onclick="saveSalesInfo()">
          土地增值稅試算
          <span class="desc">進入土地增值稅計算頁面</span>
        </a>
      </div>

      <div class="footer">
        本網站提供房地合一稅與土地增值稅試算工具，實際稅額仍以主管機關核定為準。
      </div>
    </div>
  </div>
  <script>
    function saveSalesInfo() {
      const name = document.getElementById('salesName').value.trim();
      const phone = document.getElementById('salesPhone').value.trim();
      localStorage.setItem('salesName', name);
      localStorage.setItem('salesPhone', phone);
    }

    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('salesName').value = localStorage.getItem('salesName') || '';
      document.getElementById('salesPhone').value = localStorage.getItem('salesPhone') || '';
    });
  </script>
</body>
</html>
